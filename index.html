<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Gorillax — Legal</title>
  <style>
    :root { --bg:#0f0f12; --card:#1a1a22; --text:#f4f4f5; --muted:#a1a1aa; --accent:#f97316; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background:var(--bg); color:var(--text); line-height:1.6; padding:2rem 1rem; }
    .wrap { max-width: 640px; margin: 0 auto; }
    h1 { font-size: 1.75rem; margin-bottom: 0.25rem; }
    p.lead { color: var(--muted); margin-top: 0; }
    ul { list-style: none; padding: 0; margin: 2rem 0; }
    li { margin: 0.75rem 0; }
    a { display: block; padding: 1rem 1.25rem; background: var(--card); border-radius: 12px; color: var(--text); text-decoration: none; border: 1px solid #2a2a35; }
    a:hover { border-color: var(--accent); }
    a span { display: block; font-size: 0.85rem; color: var(--muted); margin-top: 0.25rem; }
    footer { margin-top: 3rem; font-size: 0.85rem; color: var(--muted); }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Gorillax</h1>
    <p class="lead">Documents légaux / Legal documents</p>
    <ul>
      <li><a href="privacy.html">Politique de confidentialité <span>Privacy Policy (FR)</span></a></li>
      <li><a href="privacy-en.html">Privacy Policy <span>English</span></a></li>
      <li><a href="terms.html">Conditions d'utilisation <span>Terms of Service (FR)</span></a></li>
      <li><a href="terms-en.html">Terms of Service <span>English</span></a></li>
    </ul>
    <footer>Contact : <a href="mailto:arthur.destribats@gmail.com" style="display:inline;padding:0;background:none;border:none;color:var(--accent);">arthur.destribats@gmail.com</a></footer>
  </div>
</body>
</html>
