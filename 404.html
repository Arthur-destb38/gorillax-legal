<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>404 — Gorillax</title>
  <meta name="robots" content="noindex" />
  <link rel="icon" type="image/png" href="/assets/favicon.png" />
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0F1218;
      color: #F4F4F5;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      text-align: center;
      padding: 1.5rem;
    }
    .card { max-width: 420px; }
    .pic {
      width: 180px;
      height: 180px;
      margin: 0 auto 1.4rem;
      border-radius: 50%;
      background: url('/assets/coach.jpg') center 12% / cover no-repeat;
      border: 1px solid rgba(255, 255, 255, 0.14);
      box-shadow: 0 20px 60px rgba(99, 102, 241, 0.35);
    }
    .code { color: #818CF8; font-weight: 800; letter-spacing: 0.2em; font-size: 0.8rem; }
    h1 { font-size: 1.6rem; margin: 0.4rem 0 0.6rem; letter-spacing: -0.01em; }
    p { color: #A1A1AA; margin: 0 0 1.6rem; }
    a.btn {
      display: inline-block;
      padding: 0.85rem 1.8rem;
      border-radius: 14px;
      font-weight: 700;
      text-decoration: none;
      color: #fff;
      background: linear-gradient(135deg, #6366F1, #8B5CF6);
    }
    .tout { color: #52525B; font-size: 0.85rem; margin-top: 1.6rem; }
  </style>
</head>
<body>
  <div class="card">
    <div class="pic" role="img" aria-label="Le Coach te regarde"></div>
    <div class="code">ERREUR 404</div>
    <h1>« Cette page existe pas, petit. »</h1>
    <p>« Elle est pas au Registre. Donc elle a jamais existé.<br />Retourne t'entraîner. »</p>
    <a class="btn" href="/">Retour à la Salle</a>
    <div class="tout">— Le Coach. C'est tout.</div>
  </div>
</body>
</html>
